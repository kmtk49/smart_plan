name: Smart Plan

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview    # 10日プレビュー（アップロードなし）
          - today      # 当日のみ表示
          - upload     # Intervals.icu にアップロード
      days:
        description: '日数（preview/upload時のみ有効）'
        required: false
        default: '10'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージのインストール
        run: pip install pyyaml

      - name: Smart Plan 実行
        env:
          INTERVALS_ICU_ATHLETE_ID: ${{ secrets.INTERVALS_ICU_ATHLETE_ID }}
          INTERVALS_ICU_API_KEY: ${{ secrets.INTERVALS_ICU_API_KEY }}
          CI: "true"
        run: |
          MODE="${{ github.event.inputs.mode }}"
          DAYS="${{ github.event.inputs.days }}"

          if [ "$MODE" = "today" ]; then
            python -u run_smart_plan.py --today
          elif [ "$MODE" = "upload" ]; then
            python -u run_smart_plan.py --days "$DAYS" --no-chat
          else
            python -u run_smart_plan.py --days "$DAYS" --preview --no-chat
          fi
